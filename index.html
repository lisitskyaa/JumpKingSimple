<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Jump Chicken v0.0.10</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Consolas, "Courier New", monospace;
      background: #11141c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overscroll-behavior: none;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100dvh;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      overflow-x: hidden;
      overflow-y: auto;
      background:
        radial-gradient(circle at top, #22293a 0%, #11141c 62%);
    }

    .game-shell {
      width: min(900px, calc(100vw - 24px));
      user-select: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 9 / 7;
      border: 1px solid #3a4052;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
      background: #1b202e;
      outline: none;
    }

    .help {
      margin-top: 8px;
      color: #aeb7ca;
      font-size: 13px;
      line-height: 1.35;
      text-align: center;
    }

    kbd {
      padding: 1px 5px;
      border: 1px solid #4b5367;
      border-bottom-width: 2px;
      border-radius: 4px;
      background: #252b3a;
      color: #eef1f7;
      font-family: inherit;
    }
  
    .mobile-controls {
      display: none;
      gap: 10px;
      margin-top: 12px;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .mobile-main-controls {
      display: grid;
      grid-template-columns: 1fr 1.35fr 1fr;
      gap: 10px;
    }

    .mobile-secondary-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: min(520px, 78%);
      margin: 38px auto 0;
    }

    .control-button {
      min-height: 88px;
      border: 2px solid #59637a;
      border-radius: 18px;
      background:
        linear-gradient(180deg, #343d52 0%, #242b3c 100%);
      color: #f3f5fa;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 6px 0 #171c28,
        0 10px 24px rgba(0, 0, 0, 0.32);
      font: 700 34px/1 Consolas, "Courier New", monospace;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .control-button.jump-button {
      background:
        linear-gradient(180deg, #a87427 0%, #72501e 100%);
      border-color: #d3a44e;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .control-button.secondary-button {
      min-height: 54px;
      border-radius: 14px;
      font-size: 16px;
      color: #cbd2df;
      opacity: 0.86;
    }

    .control-button.is-pressed,
    .control-button:active {
      transform: translateY(5px);
      box-shadow:
        inset 0 2px 8px rgba(0, 0, 0, 0.35),
        0 1px 0 #171c28;
      filter: brightness(1.18);
    }

    @media (hover: none), (pointer: coarse), (max-width: 720px) {
      body {
        align-items: start;
      }

      .game-shell {
        width: min(900px, 100%);
      }

      .mobile-controls {
        display: block;
      }

      .help {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .mobile-main-controls {
        gap: 8px;
      }

      .mobile-controls {
        gap: 8px;
        margin-top: 10px;
      }

      .mobile-secondary-controls {
        width: 82%;
        margin-top: 34px;
      }

      .control-button {
        min-height: 82px;
        border-radius: 16px;
        font-size: 32px;
      }

      .control-button.jump-button {
        font-size: 21px;
      }

      .control-button.secondary-button {
        min-height: 54px;
        font-size: 15px;
      }
    }

    @media (orientation: landscape) and (max-height: 620px) {
      body {
        padding-top: 6px;
        padding-bottom: 6px;
      }

      .game-shell {
        width: min(760px, 100%);
      }

      .control-button {
        min-height: 64px;
      }

      .control-button.secondary-button {
        min-height: 44px;
      }

      .mobile-controls {
        margin-top: 6px;
      }

      .mobile-secondary-controls {
        width: 70%;
        margin-top: 18px;
      }
    }

  </style>
</head>
<body>
  <main class="game-shell">
    <canvas
      id="game"
      width="900"
      height="700"
      tabindex="0"
      aria-label="1000m Hardcore Jump game"
    ></canvas>
    <div class="help">
      <kbd>A</kbd>/<kbd>D</kbd> or arrow keys — run and face,
      <kbd>Space</kbd> — hold to charge, release to jump,
      <kbd>R</kbd> — restart, <kbd>Esc</kbd> — pause.
    </div>

    <section class="mobile-controls" aria-label="Mobile game controls">
      <div class="mobile-main-controls">
        <button
          id="mobile-left"
          class="control-button"
          type="button"
          aria-label="Move left"
        >&#9664;</button>

        <button
          id="mobile-jump"
          class="control-button jump-button"
          type="button"
          aria-label="Charge and release jump"
        >JUMP</button>

        <button
          id="mobile-right"
          class="control-button"
          type="button"
          aria-label="Move right"
        >&#9654;</button>
      </div>

      <div class="mobile-secondary-controls">
        <button
          id="mobile-restart"
          class="control-button secondary-button"
          type="button"
        >RESTART</button>

        <button
          id="mobile-pause"
          class="control-button secondary-button"
          type="button"
        >PAUSE</button>
      </div>
    </section>
  </main>

  <script>
    "use strict";

    // ========================================================
    // CONFIG
    // ========================================================

    const SCREEN_WIDTH = 900;
    const SCREEN_HEIGHT = 700;

    const WORLD_WIDTH = 900;
    const START_GROUND_Y = 620;
    const MAX_HEIGHT_METERS = 1000;

    // null = normal start.
    // Example: 386 and 430 starts on the left 386 m platform.
    const DEBUG_START_HEIGHT = null;
    const DEBUG_START_X = 200;

    const GRAVITY = 1800.0;

    const PLAYER_WIDTH = 34;
    const PLAYER_HEIGHT = 50;

    const GROUND_ACCELERATION = 2200.0;
    const MAX_RUN_SPEED = 280.0;
    const GROUND_FRICTION = 2600.0;

    const MIN_JUMP_SPEED = 480.0;
    const MAX_JUMP_SPEED = 980.0;

    const MIN_HORIZONTAL_JUMP_SPEED = 100.0;
    const MAX_HORIZONTAL_JUMP_SPEED = 420.0;

    const MAX_CHARGE_TIME = 1.2;

    const WALL_BOUNCE_FACTOR = 0.82;
    const WALL_BOUNCE_VERTICAL_KICK = 360.0;
    const MAX_BOUNCE_UPWARD_SPEED = 1180.0;

    const CEILING_BOUNCE_FACTOR = 0.45;

    const CAMERA_SMOOTHING = 8.0;


    // ========================================================
    // COLORS
    // ========================================================

    const COLORS = {
      sky: "rgb(27, 32, 46)",
      sky2: "rgb(47, 55, 78)",
      platform: "rgb(103, 119, 86)",
      platformTop: "rgb(151, 169, 121)",
      goal: "rgb(156, 123, 56)",
      goalTop: "rgb(245, 211, 100)",
      block: "rgb(76, 80, 94)",
      blockEdge: "rgb(130, 139, 160)",
      player: "rgb(221, 181, 108)",
      playerOutline: "rgb(67, 49, 36)",
      chargeBg: "rgb(50, 50, 60)",
      white: "rgb(240, 240, 240)",
      black: "rgb(15, 15, 18)",
      yellow: "rgb(240, 205, 90)",
      green: "rgb(120, 235, 140)",
      bounce: "rgb(245, 220, 120)"
    };


    // ========================================================
    // SOUNDS — MOBILE-SAFE WEB AUDIO API
    // ========================================================
    //
    // Required files:
    //   sounds/jump.wav
    //   sounds/power_jump.wav
    //   sounds/finish.wav
    //
    // Raw files are downloaded in advance, but AudioContext is
    // created only after a real keyboard/touch interaction.
    // This is more reliable on iOS Safari and mobile Chrome.
    // ========================================================

    const AudioContextClass = (
      window.AudioContext ||
      window.webkitAudioContext
    );

    const SOUND_FILES = {
      jump: "sounds/jump.wav",
      powerJump: "sounds/power_jump.wav",
      finish: "sounds/finish.wav"
    };

    const SOUND_VOLUMES = {
      jump: 0.75,
      powerJump: 0.85,
      finish: 0.9
    };

    let audioContext = null;
    let audioUnlocked = false;
    let lastPowerJumpSoundTime = -Infinity;

    const rawSoundData = new Map();
    const rawSoundPromises = new Map();
    const soundBuffers = new Map();
    const decodePromises = new Map();


    async function fetchSoundFile(name, url) {
      if (rawSoundData.has(name)) {
        return rawSoundData.get(name);
      }

      if (rawSoundPromises.has(name)) {
        return rawSoundPromises.get(name);
      }

      const promise = (async () => {
        try {
          const response = await fetch(url, {
            cache: "force-cache"
          });

          if (!response.ok) {
            throw new Error(
              `Failed to load ${url}: ${response.status}`
            );
          }

          const data = await response.arrayBuffer();
          rawSoundData.set(name, data);
          return data;

        } catch (error) {
          console.warn(
            `Sound file "${name}" could not be loaded.`,
            error
          );

          return null;
        }
      })();

      rawSoundPromises.set(name, promise);
      return promise;
    }


    function preloadSoundFiles() {
      for (const [name, url] of Object.entries(SOUND_FILES)) {
        fetchSoundFile(name, url);
      }
    }


    async function unlockAudio() {
      if (!AudioContextClass) {
        return false;
      }

      try {
        // Creating AudioContext inside a user gesture is
        // important for mobile Safari.
        if (!audioContext) {
          audioContext = new AudioContextClass({
            latencyHint: "interactive"
          });
        }

        if (audioContext.state !== "running") {
          await audioContext.resume();
        }

        audioUnlocked = (
          audioContext.state === "running"
        );

        return audioUnlocked;

      } catch (error) {
        console.warn(
          "Web Audio could not be unlocked.",
          error
        );

        return false;
      }
    }


    async function decodeSound(name) {
      if (!audioContext) {
        return null;
      }

      if (soundBuffers.has(name)) {
        return soundBuffers.get(name);
      }

      if (decodePromises.has(name)) {
        return decodePromises.get(name);
      }

      const promise = (async () => {
        const rawData = await fetchSoundFile(
          name,
          SOUND_FILES[name]
        );

        if (!rawData || !audioContext) {
          return null;
        }

        try {
          // Use a copy because some browser implementations
          // detach the supplied ArrayBuffer while decoding.
          const decoded = await audioContext.decodeAudioData(
            rawData.slice(0)
          );

          soundBuffers.set(name, decoded);
          return decoded;

        } catch (error) {
          console.warn(
            `Sound "${name}" could not be decoded.`,
            error
          );

          return null;
        }
      })();

      decodePromises.set(name, promise);
      return promise;
    }


    async function prepareDecodedSounds() {
      const unlocked = await unlockAudio();

      if (!unlocked) {
        return;
      }

      for (const name of Object.keys(SOUND_FILES)) {
        decodeSound(name);
      }
    }


    async function playGameSound(name) {
      if (name === "powerJump") {
        const now = performance.now();

        if (now - lastPowerJumpSoundTime < 90) {
          return;
        }

        lastPowerJumpSoundTime = now;
      }

      const unlocked = await unlockAudio();

      if (!unlocked || !audioContext) {
        return;
      }

      const buffer = await decodeSound(name);

      if (!buffer || !audioContext) {
        return;
      }

      try {
        if (audioContext.state !== "running") {
          await audioContext.resume();
        }

        const source = audioContext.createBufferSource();
        const gain = audioContext.createGain();

        source.buffer = buffer;
        gain.gain.value = SOUND_VOLUMES[name] ?? 1.0;

        source.connect(gain);
        gain.connect(audioContext.destination);

        source.start(0);

        source.addEventListener(
          "ended",
          () => {
            source.disconnect();
            gain.disconnect();
          },
          { once: true }
        );

      } catch (error) {
        console.warn(
          `Sound "${name}" could not be played.`,
          error
        );
      }
    }


    preloadSoundFiles();


    // ========================================================
    // HELPERS
    // ========================================================

    function clamp(value, minimum, maximum) {
      return Math.max(minimum, Math.min(maximum, value));
    }

    function moveTowards(current, target, maxDelta) {
      if (current < target) {
        return Math.min(current + maxDelta, target);
      }

      if (current > target) {
        return Math.max(current - maxDelta, target);
      }

      return target;
    }

    function heightToWorldY(heightMeters) {
      return START_GROUND_Y - heightMeters * 10;
    }

    function positiveModulo(value, divisor) {
      return ((value % divisor) + divisor) % divisor;
    }

    function rectsOverlap(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function roundedRectPath(ctx, x, y, w, h, radius) {
      const r = Math.min(radius, w / 2, h / 2);

      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }


    // ========================================================
    // LEVEL GEOMETRY
    // ========================================================

    class Platform {
      constructor(x, y, width, height = 24, isGoal = false) {
        this.rect = {
          x: Math.round(x),
          y: Math.round(y),
          w: Math.round(width),
          h: Math.round(height)
        };

        this.isGoal = isGoal;
      }

      draw(ctx, cameraY) {
        const drawRect = {
          x: this.rect.x,
          y: Math.round(this.rect.y - cameraY),
          w: this.rect.w,
          h: this.rect.h
        };

        if (
          drawRect.y + drawRect.h < -50 ||
          drawRect.y > SCREEN_HEIGHT + 50
        ) {
          return;
        }

        ctx.fillStyle = this.isGoal
          ? COLORS.goal
          : COLORS.platform;

        ctx.fillRect(
          drawRect.x,
          drawRect.y,
          drawRect.w,
          drawRect.h
        );

        ctx.fillStyle = this.isGoal
          ? COLORS.goalTop
          : COLORS.platformTop;

        ctx.fillRect(
          drawRect.x,
          drawRect.y,
          drawRect.w,
          6
        );
      }
    }


    class SolidBlock {
      constructor(x, y, width, height) {
        this.rect = {
          x: Math.round(x),
          y: Math.round(y),
          w: Math.round(width),
          h: Math.round(height)
        };
      }

      draw(ctx, cameraY) {
        const drawRect = {
          x: this.rect.x,
          y: Math.round(this.rect.y - cameraY),
          w: this.rect.w,
          h: this.rect.h
        };

        if (
          drawRect.y + drawRect.h < -50 ||
          drawRect.y > SCREEN_HEIGHT + 50
        ) {
          return;
        }

        ctx.fillStyle = COLORS.block;
        ctx.fillRect(
          drawRect.x,
          drawRect.y,
          drawRect.w,
          drawRect.h
        );

        ctx.strokeStyle = COLORS.blockEdge;
        ctx.lineWidth = 4;
        ctx.strokeRect(
          drawRect.x + 2,
          drawRect.y + 2,
          Math.max(0, drawRect.w - 4),
          Math.max(0, drawRect.h - 4)
        );

        ctx.strokeStyle = COLORS.blockEdge;
        ctx.lineWidth = 2;

        const spacing = 34;

        for (
          let y = drawRect.y + 14;
          y < drawRect.y + drawRect.h;
          y += spacing
        ) {
          ctx.beginPath();
          ctx.moveTo(drawRect.x + 6, y);
          ctx.lineTo(drawRect.x + drawRect.w - 6, y);
          ctx.stroke();
        }
      }
    }


    const LEVEL_DATA = [[650, 12, 240], [400, 25, 220], [180, 38, 210], [440, 51, 190], [690, 65, 190], [470, 79, 180], [220, 90, 220], [450, 100, 300], [190, 112, 180], [120, 126, 120], [320, 126, 105], [520, 126, 95], [720, 126, 90], [800, 142, 100], [610, 156, 95], [380, 170, 90], [160, 184, 100], [430, 200, 280], [680, 214, 150], [785, 226, 115], [540, 239, 110], [290, 252, 105], [90, 266, 115], [340, 279, 95], [590, 291, 90], [450, 300, 260], [720, 314, 150], [650, 345, 105], [410, 358, 90], [180, 372, 82], [430, 386, 88], [690, 386, 180], [500, 400, 230], [740, 413, 130], [520, 425, 85], [280, 438, 80], [90, 450, 78], [335, 462, 75], [585, 474, 72], [790, 486, 88], [520, 500, 240], [300, 512, 190], [120, 526, 110], [300, 526, 95], [490, 526, 85], [675, 526, 80], [815, 526, 72], [780, 542, 90], [560, 556, 82], [340, 570, 76], [150, 584, 82], [550, 600, 220], [780, 614, 110], [530, 628, 90], [280, 642, 85], [80, 655, 90], [330, 668, 78], [580, 681, 74], [800, 694, 70], [560, 700, 200], [340, 710, 120], [150, 718, 135], [250, 749, 95], [500, 762, 80], [760, 775, 72], [540, 788, 68], [500, 800, 180], [745, 812, 95], [520, 825, 72], [285, 838, 68], [80, 850, 70], [325, 862, 64], [570, 874, 64], [810, 886, 68], [555, 900, 170], [760, 912, 85], [560, 912, 72], [360, 912, 66], [160, 912, 64], [100, 930, 75], [350, 943, 66], [610, 956, 62], [820, 968, 18], [570, 980, 60], [320, 990, 18], [450, 1000, 260]];
    const BLOCK_DATA = [[840, 300, 378, 40], [20, 700, 782, 42], [430, 844, 856, 48]];


    function createLevel() {
      const platforms = [
        new Platform(
          0,
          START_GROUND_Y,
          WORLD_WIDTH
        )
      ];

      for (const [centerX, heightMeters, width] of LEVEL_DATA) {
        const worldY = heightToWorldY(heightMeters);
        const x = centerX - width / 2;

        platforms.push(
          new Platform(
            x,
            worldY,
            width,
            24,
            heightMeters === MAX_HEIGHT_METERS
          )
        );
      }

      const blocks = [];

      for (
        const [x, lowerHeight, upperHeight, width]
        of BLOCK_DATA
      ) {
        const topY = heightToWorldY(upperHeight);
        const bottomY = heightToWorldY(lowerHeight);

        blocks.push(
          new SolidBlock(
            x,
            topY,
            width,
            bottomY - topY
          )
        );
      }

      return { platforms, blocks };
    }


    // ========================================================
    // PLAYER
    // ========================================================

    class Player {
      constructor(x, y) {
        this.startX = Number(x);
        this.startY = Number(y);

        this.x = Number(x);
        this.y = Number(y);

        this.vx = 0.0;
        this.vy = 0.0;

        this.onGround = false;

        this.charging = false;
        this.chargeTime = 0.0;

        this.facing = 1;

        this.currentPlatform = null;

        this.bounceFlashTimer = 0.0;
        this.lastBounceSide = 0;
      }

      get rect() {
        return {
          x: Math.round(this.x),
          y: Math.round(this.y),
          w: PLAYER_WIDTH,
          h: PLAYER_HEIGHT
        };
      }

      reset() {
        this.x = this.startX;
        this.y = this.startY;

        this.vx = 0.0;
        this.vy = 0.0;

        this.onGround = false;

        this.charging = false;
        this.chargeTime = 0.0;

        this.facing = 1;
        this.currentPlatform = null;

        this.bounceFlashTimer = 0.0;
        this.lastBounceSide = 0;
      }

      startCharge() {
        if (!this.onGround || this.charging) {
          return;
        }

        this.charging = true;
        this.chargeTime = 0.0;
        this.vx = 0.0;
      }

      releaseJump() {
        if (!this.charging) {
          return;
        }

        if (!this.onGround) {
          this.charging = false;
          this.chargeTime = 0.0;
          return;
        }

        const chargeRatio = clamp(
          this.chargeTime / MAX_CHARGE_TIME,
          0.0,
          1.0
        );

        const power = chargeRatio ** 0.75;

        const verticalSpeed = (
          MIN_JUMP_SPEED +
          (
            MAX_JUMP_SPEED -
            MIN_JUMP_SPEED
          ) * power
        );

        const horizontalSpeed = (
          MIN_HORIZONTAL_JUMP_SPEED +
          (
            MAX_HORIZONTAL_JUMP_SPEED -
            MIN_HORIZONTAL_JUMP_SPEED
          ) * power
        );

        this.vy = -verticalSpeed;
        this.vx = horizontalSpeed * this.facing;

        this.onGround = false;
        this.currentPlatform = null;

        this.charging = false;
        this.chargeTime = 0.0;

        playGameSound("jump");
      }

      applySideBounce(hitSide) {
        const speed = Math.max(
          Math.abs(this.vx) * WALL_BOUNCE_FACTOR,
          180.0
        );

        if (hitSide > 0) {
          this.vx = -speed;
          this.lastBounceSide = 1;
        } else {
          this.vx = speed;
          this.lastBounceSide = -1;
        }

        this.vy = Math.max(
          this.vy - WALL_BOUNCE_VERTICAL_KICK,
          -MAX_BOUNCE_UPWARD_SPEED
        );

        this.onGround = false;
        this.currentPlatform = null;

        this.bounceFlashTimer = 0.18;

        playGameSound("powerJump");
      }

      update(
        dt,
        platforms,
        blocks,
        leftPressed,
        rightPressed
      ) {
        if (this.bounceFlashTimer > 0.0) {
          this.bounceFlashTimer = Math.max(
            0.0,
            this.bounceFlashTimer - dt
          );
        }

        let movementDirection = 0;

        if (leftPressed && !rightPressed) {
          movementDirection = -1;
        } else if (rightPressed && !leftPressed) {
          movementDirection = 1;
        }

        if (movementDirection !== 0) {
          this.facing = movementDirection;
        }

        if (this.onGround) {
          if (this.charging) {
            this.vx = 0.0;
          } else if (movementDirection !== 0) {
            this.vx = moveTowards(
              this.vx,
              movementDirection * MAX_RUN_SPEED,
              GROUND_ACCELERATION * dt
            );
          } else {
            this.vx = moveTowards(
              this.vx,
              0.0,
              GROUND_FRICTION * dt
            );
          }
        }

        if (this.charging && this.onGround) {
          this.chargeTime = Math.min(
            this.chargeTime + dt,
            MAX_CHARGE_TIME
          );
        }

        this.vy += GRAVITY * dt;


        // ----------------------------------------------------
        // Horizontal movement and side collisions
        // ----------------------------------------------------

        let oldRect = this.rect;

        this.x += this.vx * dt;

        if (this.x < 0) {
          this.x = 0;

          if (this.vx < 0) {
            this.applySideBounce(-1);
          }
        } else if (
          this.x + PLAYER_WIDTH > WORLD_WIDTH
        ) {
          this.x = WORLD_WIDTH - PLAYER_WIDTH;

          if (this.vx > 0) {
            this.applySideBounce(1);
          }
        }

        let currentRect = this.rect;

        for (const platform of platforms) {
          const p = platform.rect;

          const verticalOverlap = (
            currentRect.y + currentRect.h > p.y &&
            currentRect.y < p.y + p.h
          );

          if (!verticalOverlap) {
            continue;
          }

          const crossedLeftSide = (
            this.vx > 0 &&
            oldRect.x + oldRect.w <= p.x &&
            currentRect.x + currentRect.w >= p.x
          );

          if (crossedLeftSide) {
            this.x = p.x - PLAYER_WIDTH;
            this.vx = 0.0;
            currentRect = this.rect;
            continue;
          }

          const crossedRightSide = (
            this.vx < 0 &&
            oldRect.x >= p.x + p.w &&
            currentRect.x <= p.x + p.w
          );

          if (crossedRightSide) {
            this.x = p.x + p.w;
            this.vx = 0.0;
            currentRect = this.rect;
          }
        }

        currentRect = this.rect;

        for (const block of blocks) {
          const b = block.rect;

          if (!rectsOverlap(currentRect, b)) {
            continue;
          }

          if (
            this.vx > 0 &&
            oldRect.x + oldRect.w <= b.x
          ) {
            this.x = b.x - PLAYER_WIDTH;
            this.applySideBounce(1);
            currentRect = this.rect;
          } else if (
            this.vx < 0 &&
            oldRect.x >= b.x + b.w
          ) {
            this.x = b.x + b.w;
            this.applySideBounce(-1);
            currentRect = this.rect;
          }
        }


        // ----------------------------------------------------
        // Vertical movement and top/bottom collisions
        // ----------------------------------------------------

        oldRect = this.rect;

        this.y += this.vy * dt;

        let newRect = this.rect;

        this.onGround = false;
        this.currentPlatform = null;

        for (const block of blocks) {
          const b = block.rect;

          const horizontalOverlap = (
            newRect.x + newRect.w > b.x &&
            newRect.x < b.x + b.w
          );

          if (!horizontalOverlap) {
            continue;
          }

          const crossedBlockTop = (
            this.vy >= 0 &&
            oldRect.y + oldRect.h <= b.y &&
            newRect.y + newRect.h >= b.y
          );

          if (crossedBlockTop) {
            this.y = b.y - PLAYER_HEIGHT;
            this.vy = 0.0;
            this.onGround = true;
            this.currentPlatform = block;

            newRect = this.rect;
            break;
          }

          const crossedBlockUnderside = (
            this.vy < 0 &&
            oldRect.y >= b.y + b.h &&
            newRect.y <= b.y + b.h
          );

          if (crossedBlockUnderside) {
            this.y = b.y + b.h;
            this.vy = Math.abs(this.vy)
              * CEILING_BOUNCE_FACTOR;

            this.onGround = false;
            this.currentPlatform = null;

            newRect = this.rect;
            break;
          }
        }

        if (!this.onGround) {
          for (const platform of platforms) {
            const p = platform.rect;

            const horizontalOverlap = (
              newRect.x + newRect.w > p.x &&
              newRect.x < p.x + p.w
            );

            if (!horizontalOverlap) {
              continue;
            }

            const crossedTop = (
              this.vy >= 0 &&
              oldRect.y < p.y &&
              newRect.y + newRect.h >= p.y
            );

            if (crossedTop) {
              this.y = p.y - PLAYER_HEIGHT;
              this.vy = 0.0;

              this.onGround = true;
              this.currentPlatform = platform;

              newRect = this.rect;
              break;
            }

            const crossedUnderside = (
              this.vy < 0 &&
              oldRect.y >= p.y + p.h &&
              newRect.y <= p.y + p.h
            );

            if (crossedUnderside) {
              this.y = p.y + p.h;
              this.vy = 0.0;

              this.onGround = false;
              this.currentPlatform = null;

              newRect = this.rect;
              break;
            }
          }
        }
      }

      draw(ctx, cameraY) {
        const drawX = Math.round(this.x);
        const drawY = Math.round(this.y - cameraY);

        // Experimental charging pose:
        // one fixed crouch frame with no progressive animation.
        const compression = this.charging
          ? 10
          : 0;

        const bodyRect = {
          x: drawX,
          y: drawY + compression,
          w: PLAYER_WIDTH,
          h: PLAYER_HEIGHT - compression
        };

        roundedRectPath(
          ctx,
          bodyRect.x,
          bodyRect.y,
          bodyRect.w,
          bodyRect.h,
          6
        );

        ctx.fillStyle = COLORS.player;
        ctx.fill();

        ctx.lineWidth = 3;
        ctx.strokeStyle = COLORS.playerOutline;
        ctx.stroke();

        const eyeX = this.facing > 0
          ? bodyRect.x + bodyRect.w - 10
          : bodyRect.x + 10;

        const eyeY = bodyRect.y + 15;

        ctx.beginPath();
        ctx.arc(eyeX, eyeY, 3, 0, Math.PI * 2);
        ctx.fillStyle = COLORS.black;
        ctx.fill();

        const noseY = bodyRect.y + 23;

        ctx.beginPath();
        ctx.lineWidth = 3;
        ctx.strokeStyle = COLORS.playerOutline;

        if (this.facing > 0) {
          ctx.moveTo(
            bodyRect.x + bodyRect.w - 2,
            noseY
          );

          ctx.lineTo(
            bodyRect.x + bodyRect.w + 5,
            noseY
          );
        } else {
          ctx.moveTo(
            bodyRect.x + 2,
            noseY
          );

          ctx.lineTo(
            bodyRect.x - 5,
            noseY
          );
        }

        ctx.stroke();

        if (this.bounceFlashTimer > 0.0) {
          ctx.beginPath();
          ctx.arc(
            bodyRect.x + bodyRect.w / 2,
            bodyRect.y + bodyRect.h / 2,
            30,
            0,
            Math.PI * 2
          );

          ctx.lineWidth = 3;
          ctx.strokeStyle = COLORS.bounce;
          ctx.stroke();
        }
      }
    }


    // ========================================================
    // UI / DRAWING
    // ========================================================

    function drawBackground(ctx, cameraY) {
      ctx.fillStyle = COLORS.sky;
      ctx.fillRect(
        0,
        0,
        SCREEN_WIDTH,
        SCREEN_HEIGHT
      );

      for (let i = 0; i < 70; i += 1) {
        const x = (i * 193) % SCREEN_WIDTH;

        const screenY = positiveModulo(
          i * 317 - cameraY * 0.20,
          SCREEN_HEIGHT
        );

        const radius = i % 4 === 0 ? 2 : 1;

        ctx.beginPath();
        ctx.arc(x, screenY, radius, 0, Math.PI * 2);
        ctx.fillStyle = COLORS.sky2;
        ctx.fill();
      }
    }


    function getSectionName(height) {
      if (height < 100) return "THE FOOTHILLS";
      if (height < 200) return "THE CROSSING";
      if (height < 300) return "EDGE BAIT";
      if (height < 400) return "BOUNCE SHAFT";
      if (height < 500) return "THE NEEDLE";
      if (height < 600) return "SECOND CROSSING";
      if (height < 700) return "THE SAW";
      if (height < 800) return "LEFT WALL REBOUND";
      if (height < 900) return "PUNISHMENT ZONE";
      return "FINAL SIDEWAYS GAUNTLET";
    }


    function drawText(
      ctx,
      text,
      x,
      y,
      size,
      color,
      bold = false,
      align = "left"
    ) {
      ctx.font = `${bold ? "700 " : ""}${size}px Consolas, "Courier New", monospace`;
      ctx.fillStyle = color;
      ctx.textAlign = align;
      ctx.textBaseline = "top";
      ctx.fillText(text, x, y);
    }


    function drawUI(
      ctx,
      player,
      currentHeight,
      recordHeight
    ) {
      drawText(
        ctx,
        `${Math.round(currentHeight)} / 1000 m`,
        SCREEN_WIDTH - 20,
        20,
        26,
        COLORS.white,
        true,
        "right"
      );

      drawText(
        ctx,
        `Record: ${Math.round(recordHeight)} m`,
        SCREEN_WIDTH - 20,
        58,
        16,
        COLORS.yellow,
        false,
        "right"
      );

      drawText(
        ctx,
        getSectionName(currentHeight),
        20,
        52,
        16,
        COLORS.white
      );

      const progress = clamp(
        currentHeight / MAX_HEIGHT_METERS,
        0.0,
        1.0
      );

      const barX = 20;
      const barY = 82;
      const barWidth = 220;
      const barHeight = 10;

      ctx.fillStyle = COLORS.chargeBg;
      ctx.fillRect(
        barX,
        barY,
        barWidth,
        barHeight
      );

      ctx.fillStyle = COLORS.yellow;
      ctx.fillRect(
        barX,
        barY,
        Math.trunc(barWidth * progress),
        barHeight
      );

    }


    function drawCenteredOverlay(
      ctx,
      title,
      subtitle,
      footer,
      titleColor
    ) {
      ctx.fillStyle = "rgba(0, 0, 0, 0.63)";
      ctx.fillRect(
        0,
        0,
        SCREEN_WIDTH,
        SCREEN_HEIGHT
      );

      drawText(
        ctx,
        title,
        SCREEN_WIDTH / 2,
        SCREEN_HEIGHT / 2 - 70,
        52,
        titleColor,
        true,
        "center"
      );

      drawText(
        ctx,
        subtitle,
        SCREEN_WIDTH / 2,
        SCREEN_HEIGHT / 2 + 5,
        26,
        COLORS.white,
        true,
        "center"
      );

      drawText(
        ctx,
        footer,
        SCREEN_WIDTH / 2,
        SCREEN_HEIGHT / 2 + 60,
        16,
        COLORS.white,
        false,
        "center"
      );
    }


    // ========================================================
    // GAME SETUP
    // ========================================================

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const { platforms, blocks } = createLevel();

    const goalPlatform = platforms.find(
      platform => platform.isGoal
    );

    let spawnX;
    let spawnY;
    let spawnPlatform = null;

    if (DEBUG_START_HEIGHT === null) {
      spawnX = (
        SCREEN_WIDTH / 2 -
        PLAYER_WIDTH / 2
      );

      spawnY = (
        START_GROUND_Y -
        PLAYER_HEIGHT
      );

      spawnPlatform = platforms[0];

    } else {
      const targetY = heightToWorldY(
        DEBUG_START_HEIGHT
      );

      const candidates = platforms.filter(
        platform => Math.abs(
          platform.rect.y - targetY
        ) <= 2
      );

      if (candidates.length === 0) {
        throw new Error(
          `No platform found at ${DEBUG_START_HEIGHT} m`
        );
      }

      spawnPlatform = candidates.reduce(
        (best, platform) => {
          const bestDistance = Math.abs(
            best.rect.x + best.rect.w / 2 -
            DEBUG_START_X
          );

          const currentDistance = Math.abs(
            platform.rect.x + platform.rect.w / 2 -
            DEBUG_START_X
          );

          return currentDistance < bestDistance
            ? platform
            : best;
        }
      );

      spawnX = (
        spawnPlatform.rect.x +
        spawnPlatform.rect.w / 2 -
        PLAYER_WIDTH / 2
      );

      spawnY = (
        spawnPlatform.rect.y -
        PLAYER_HEIGHT
      );
    }

    const player = new Player(spawnX, spawnY);

    // Start in a stable grounded state instead of waiting for
    // the first physics frame to rediscover the platform.
    player.onGround = true;
    player.currentPlatform = spawnPlatform;

    let cameraY = Math.min(
      spawnY - SCREEN_HEIGHT * 0.62,
      0.0
    );

    let highestHeight = Math.max(
      0.0,
      (
        START_GROUND_Y -
        (
          spawnY +
          PLAYER_HEIGHT
        )
      ) / 10.0
    );

    let currentHeight = highestHeight;

    let won = false;
    let paused = false;

    const keys = new Set();

    let mobileLeftPressed = false;
    let mobileRightPressed = false;


    function resetPlayer() {
      player.reset();

      player.onGround = true;
      player.currentPlatform = spawnPlatform;

      cameraY = Math.min(
        player.y - SCREEN_HEIGHT * 0.62,
        0.0
      );

      won = false;
    }


    function isLeftPressed() {
      return (
        keys.has("ArrowLeft") ||
        keys.has("KeyA") ||
        mobileLeftPressed
      );
    }

    function isRightPressed() {
      return (
        keys.has("ArrowRight") ||
        keys.has("KeyD") ||
        mobileRightPressed
      );
    }



    function bindHoldButton(button, onPress, onRelease) {
      const activePointers = new Set();

      function press(event) {
        event.preventDefault();
        prepareDecodedSounds();

        activePointers.add(event.pointerId);
        button.classList.add("is-pressed");

        try {
          button.setPointerCapture(event.pointerId);
        } catch {
          // Pointer capture is optional.
        }

        onPress();
      }

      function release(event) {
        if (!activePointers.has(event.pointerId)) {
          return;
        }

        event.preventDefault();
        activePointers.delete(event.pointerId);

        if (activePointers.size === 0) {
          button.classList.remove("is-pressed");
          onRelease();
        }
      }

      button.addEventListener("pointerdown", press);
      button.addEventListener("pointerup", release);
      button.addEventListener("pointercancel", release);
      button.addEventListener("lostpointercapture", release);

      button.addEventListener("contextmenu", event => {
        event.preventDefault();
      });
    }


    const mobileLeftButton = document.getElementById(
      "mobile-left"
    );

    const mobileRightButton = document.getElementById(
      "mobile-right"
    );

    const mobileJumpButton = document.getElementById(
      "mobile-jump"
    );

    const mobileRestartButton = document.getElementById(
      "mobile-restart"
    );

    const mobilePauseButton = document.getElementById(
      "mobile-pause"
    );


    bindHoldButton(
      mobileLeftButton,
      () => {
        mobileLeftPressed = true;
        canvas.focus();
      },
      () => {
        mobileLeftPressed = false;
      }
    );


    bindHoldButton(
      mobileRightButton,
      () => {
        mobileRightPressed = true;
        canvas.focus();
      },
      () => {
        mobileRightPressed = false;
      }
    );


    bindHoldButton(
      mobileJumpButton,
      () => {
        canvas.focus();

        if (!won && !paused) {
          player.startCharge();
        }
      },
      () => {
        if (!won && !paused) {
          player.releaseJump();
        }
      }
    );


    mobileRestartButton.addEventListener(
      "pointerdown",
      event => {
        event.preventDefault();
        prepareDecodedSounds();
        mobileRestartButton.classList.add("is-pressed");
        resetPlayer();
        canvas.focus();
      }
    );

    function releaseRestartButton(event) {
      event.preventDefault();
      mobileRestartButton.classList.remove("is-pressed");
    }

    mobileRestartButton.addEventListener(
      "pointerup",
      releaseRestartButton
    );

    mobileRestartButton.addEventListener(
      "pointercancel",
      releaseRestartButton
    );


    mobilePauseButton.addEventListener(
      "pointerdown",
      event => {
        event.preventDefault();
        prepareDecodedSounds();
        mobilePauseButton.classList.add("is-pressed");
        paused = !paused;
        mobilePauseButton.textContent = paused
          ? "RESUME"
          : "PAUSE";
        canvas.focus();
      }
    );

    function releasePauseButton(event) {
      event.preventDefault();
      mobilePauseButton.classList.remove("is-pressed");
    }

    mobilePauseButton.addEventListener(
      "pointerup",
      releasePauseButton
    );

    mobilePauseButton.addEventListener(
      "pointercancel",
      releasePauseButton
    );


    document.addEventListener(
      "touchmove",
      event => {
        if (event.target.closest(".mobile-controls")) {
          event.preventDefault();
        }
      },
      { passive: false }
    );


    window.addEventListener("keydown", event => {
      prepareDecodedSounds();

      if (
        event.code === "ArrowLeft" ||
        event.code === "ArrowRight" ||
        event.code === "Space"
      ) {
        event.preventDefault();
      }

      keys.add(event.code);

      if (event.repeat) {
        return;
      }

      if (event.code === "Escape") {
        paused = !paused;
        mobilePauseButton.textContent = paused
          ? "RESUME"
          : "PAUSE";
        return;
      }

      if (event.code === "KeyR") {
        resetPlayer();
        return;
      }

      if (event.code === "Space" && !won && !paused) {
        player.startCharge();
      }
    });


    window.addEventListener("keyup", event => {
      if (
        event.code === "ArrowLeft" ||
        event.code === "ArrowRight" ||
        event.code === "Space"
      ) {
        event.preventDefault();
      }

      keys.delete(event.code);

      if (event.code === "Space" && !won && !paused) {
        player.releaseJump();
      }
    });


    window.addEventListener("blur", () => {
      keys.clear();

      mobileLeftPressed = false;
      mobileRightPressed = false;

      mobileLeftButton.classList.remove("is-pressed");
      mobileRightButton.classList.remove("is-pressed");
      mobileJumpButton.classList.remove("is-pressed");

      if (player.charging) {
        player.charging = false;
        player.chargeTime = 0.0;
      }

      paused = true;
    });


    canvas.addEventListener("pointerdown", () => {
      canvas.focus();
    });

    canvas.focus();


    // ========================================================
    // GAME LOOP
    // ========================================================

    let previousTime = performance.now();

    function frame(now) {
      let dt = (now - previousTime) / 1000.0;
      previousTime = now;

      dt = Math.min(dt, 1.0 / 30.0);

      if (!paused && !won) {
        const physicsStep = 1.0 / 120.0;
        let remainingTime = dt;

        while (remainingTime > 0.0) {
          const step = Math.min(
            physicsStep,
            remainingTime
          );

          player.update(
            step,
            platforms,
            blocks,
            isLeftPressed(),
            isRightPressed()
          );

          remainingTime -= step;
        }
      }

      const playerFeetY = (
        player.y +
        PLAYER_HEIGHT
      );

      currentHeight = Math.max(
        0.0,
        (
          START_GROUND_Y -
          playerFeetY
        ) / 10.0
      );

      currentHeight = Math.min(
        currentHeight,
        MAX_HEIGHT_METERS
      );

      highestHeight = Math.max(
        highestHeight,
        currentHeight
      );

      if (
        !won &&
        player.onGround &&
        player.currentPlatform === goalPlatform
      ) {
        won = true;
        playGameSound("finish");
      }

      if (!paused) {
        const targetCameraY = Math.min(
          player.y - SCREEN_HEIGHT * 0.62,
          0.0
        );

        cameraY += (
          targetCameraY -
          cameraY
        ) * Math.min(
          CAMERA_SMOOTHING * dt,
          1.0
        );
      }

      if (player.y > 1000) {
        resetPlayer();
      }

      drawBackground(ctx, cameraY);

      for (const platform of platforms) {
        platform.draw(ctx, cameraY);
      }

      for (const block of blocks) {
        block.draw(ctx, cameraY);
      }

      player.draw(ctx, cameraY);

      drawUI(
        ctx,
        player,
        currentHeight,
        highestHeight
      );

      if (won) {
        drawCenteredOverlay(
          ctx,
          "1000 METERS!",
          "You reached the summit",
          "Press R to restart",
          COLORS.green
        );
      } else if (paused) {
        drawCenteredOverlay(
          ctx,
          "PAUSED",
          "Press Esc to continue",
          "R restarts from the selected spawn point",
          COLORS.yellow
        );
      }

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
