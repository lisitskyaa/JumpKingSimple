<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Jump Chicken v0.0.20 — Procedural Pixel Art</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Consolas, "Courier New", monospace;
      background: #11141c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overscroll-behavior: none;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100dvh;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      overflow-x: hidden;
      overflow-y: auto;
      background:
        radial-gradient(circle at top, #22293a 0%, #11141c 62%);
    }

    .game-shell {
      width: min(900px, calc(100vw - 24px));
      user-select: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 9 / 7;
      border: 4px solid #2b2634;
      box-shadow:
        0 0 0 4px #68583f,
        0 18px 60px rgba(0, 0, 0, 0.45);
      background: #182033;
      outline: none;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .help {
      margin-top: 8px;
      color: #aeb7ca;
      font-size: 13px;
      line-height: 1.35;
      text-align: center;
    }

    kbd {
      padding: 1px 5px;
      border: 1px solid #4b5367;
      border-bottom-width: 2px;
      border-radius: 4px;
      background: #252b3a;
      color: #eef1f7;
      font-family: inherit;
    }
  
    .mobile-controls {
      display: none;
      gap: 10px;
      margin-top: 12px;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .mobile-main-controls {
      display: grid;
      grid-template-columns: 1fr 1.35fr 1fr;
      gap: 10px;
    }

    .mobile-secondary-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: min(520px, 78%);
      margin: 38px auto 0;
    }

    .control-button {
      min-height: 88px;
      border: 2px solid #59637a;
      border-radius: 18px;
      background:
        linear-gradient(180deg, #343d52 0%, #242b3c 100%);
      color: #f3f5fa;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 6px 0 #171c28,
        0 10px 24px rgba(0, 0, 0, 0.32);
      font: 700 34px/1 Consolas, "Courier New", monospace;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .control-button.jump-button {
      background:
        linear-gradient(180deg, #a87427 0%, #72501e 100%);
      border-color: #d3a44e;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .control-button.secondary-button {
      min-height: 54px;
      border-radius: 14px;
      font-size: 16px;
      color: #cbd2df;
      opacity: 0.86;
    }

    .control-button.is-pressed,
    .control-button:active {
      transform: translateY(5px);
      box-shadow:
        inset 0 2px 8px rgba(0, 0, 0, 0.35),
        0 1px 0 #171c28;
      filter: brightness(1.18);
    }

    @media (hover: none), (pointer: coarse), (max-width: 720px) {
      body {
        align-items: start;
      }

      .game-shell {
        width: min(900px, 100%);
      }

      .mobile-controls {
        display: block;
      }

      .help {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .mobile-main-controls {
        gap: 8px;
      }

      .mobile-controls {
        gap: 8px;
        margin-top: 10px;
      }

      .mobile-secondary-controls {
        width: 82%;
        margin-top: 34px;
      }

      .control-button {
        min-height: 82px;
        border-radius: 16px;
        font-size: 32px;
      }

      .control-button.jump-button {
        font-size: 21px;
      }

      .control-button.secondary-button {
        min-height: 54px;
        font-size: 15px;
      }
    }

    @media (orientation: landscape) and (max-height: 620px) {
      body {
        padding-top: 6px;
        padding-bottom: 6px;
      }

      .game-shell {
        width: min(760px, 100%);
      }

      .control-button {
        min-height: 64px;
      }

      .control-button.secondary-button {
        min-height: 44px;
      }

      .mobile-controls {
        margin-top: 6px;
      }

      .mobile-secondary-controls {
        width: 70%;
        margin-top: 18px;
      }
    }

  </style>
</head>
<body>
  <main class="game-shell">
    <canvas
      id="game"
      width="900"
      height="700"
      tabindex="0"
      aria-label="Jump Chicken procedural pixel-art game"
    ></canvas>
    <div class="help">
      <kbd>A</kbd>/<kbd>D</kbd> or arrow keys — run and face,
      <kbd>Space</kbd> — hold to charge, release to jump,
      <kbd>R</kbd> — restart level, <kbd>Esc</kbd> — pause.
    </div>

    <section class="mobile-controls" aria-label="Mobile game controls">
      <div class="mobile-main-controls">
        <button
          id="mobile-left"
          class="control-button"
          type="button"
          aria-label="Move left"
        >&#9664;</button>

        <button
          id="mobile-jump"
          class="control-button jump-button"
          type="button"
          aria-label="Charge and release jump"
        >JUMP</button>

        <button
          id="mobile-right"
          class="control-button"
          type="button"
          aria-label="Move right"
        >&#9654;</button>
      </div>

      <div class="mobile-secondary-controls">
        <button
          id="mobile-restart"
          class="control-button secondary-button"
          type="button"
        >RESTART</button>

        <button
          id="mobile-pause"
          class="control-button secondary-button"
          type="button"
        >PAUSE</button>
      </div>
    </section>
  </main>

  <script>
    "use strict";

    // ========================================================
    // CONFIG
    // ========================================================

    const SCREEN_WIDTH = 900;
    const SCREEN_HEIGHT = 700;

    const WORLD_WIDTH = 900;
    const START_GROUND_Y = 620;
    const MAX_HEIGHT_METERS = 2000;

    // null = normal start.
    // Example: 386 and 430 starts on the left 386 m platform.
    const DEBUG_START_HEIGHT = null; //1850; //1595; //1510;
    const DEBUG_START_X = 100;

    const GRAVITY = 1800.0;

    const PLAYER_WIDTH = 34;
    const PLAYER_HEIGHT = 50;

    const GROUND_ACCELERATION = 2200.0;
    const MAX_RUN_SPEED = 280.0;
    const GROUND_FRICTION = 2600.0;

    const MIN_JUMP_SPEED = 480.0;
    const MAX_JUMP_SPEED = 980.0;

    const MIN_HORIZONTAL_JUMP_SPEED = 100.0;
    const MAX_HORIZONTAL_JUMP_SPEED = 420.0;

    const MAX_CHARGE_TIME = 1.2;

    const WALL_BOUNCE_FACTOR = 0.82;
    const WALL_BOUNCE_VERTICAL_KICK = 360.0;
    const MAX_BOUNCE_UPWARD_SPEED = 1180.0;

    const CEILING_BOUNCE_FACTOR = 0.45;

    const CAMERA_SMOOTHING = 8.0;


    // ========================================================
    // COLORS
    // ========================================================

    const COLORS = {
      sky: "rgb(27, 32, 46)",
      sky2: "rgb(47, 55, 78)",
      platform: "rgb(103, 119, 86)",
      platformTop: "rgb(151, 169, 121)",
      goal: "rgb(156, 123, 56)",
      goalTop: "rgb(245, 211, 100)",
      block: "rgb(76, 80, 94)",
      blockEdge: "rgb(130, 139, 160)",
      player: "rgb(221, 181, 108)",
      playerOutline: "rgb(67, 49, 36)",
      chargeBg: "rgb(50, 50, 60)",
      white: "rgb(240, 240, 240)",
      black: "rgb(15, 15, 18)",
      yellow: "rgb(240, 205, 90)",
      green: "rgb(120, 235, 140)",
      bounce: "rgb(245, 220, 120)"
    };


    // ========================================================
    // SOUNDS — MOBILE-SAFE WEB AUDIO API
    // ========================================================
    //
    // Required files:
    //   sounds/jump.wav
    //   sounds/power_jump.wav
    //   sounds/finish.wav
    //
    // Raw files are downloaded in advance, but AudioContext is
    // created only after a real keyboard/touch interaction.
    // This is more reliable on iOS Safari and mobile Chrome.
    // ========================================================

    const AudioContextClass = (
      window.AudioContext ||
      window.webkitAudioContext
    );

    const SOUND_FILES = {
      jump: "sounds/jump.wav",
      powerJump: "sounds/power_jump.wav",
      finish: "sounds/finish.wav"
    };

    const SOUND_VOLUMES = {
      jump: 0.75,
      powerJump: 0.85,
      finish: 0.9
    };

    let audioContext = null;
    let audioUnlocked = false;
    let lastPowerJumpSoundTime = -Infinity;

    const rawSoundData = new Map();
    const rawSoundPromises = new Map();
    const soundBuffers = new Map();
    const decodePromises = new Map();


    async function fetchSoundFile(name, url) {
      if (rawSoundData.has(name)) {
        return rawSoundData.get(name);
      }

      if (rawSoundPromises.has(name)) {
        return rawSoundPromises.get(name);
      }

      const promise = (async () => {
        try {
          const response = await fetch(url, {
            cache: "force-cache"
          });

          if (!response.ok) {
            throw new Error(
              `Failed to load ${url}: ${response.status}`
            );
          }

          const data = await response.arrayBuffer();
          rawSoundData.set(name, data);
          return data;

        } catch (error) {
          console.warn(
            `Sound file "${name}" could not be loaded.`,
            error
          );

          return null;
        }
      })();

      rawSoundPromises.set(name, promise);
      return promise;
    }


    function preloadSoundFiles() {
      for (const [name, url] of Object.entries(SOUND_FILES)) {
        fetchSoundFile(name, url);
      }
    }


    async function unlockAudio() {
      if (!AudioContextClass) {
        return false;
      }

      try {
        // Use the media playback session on supported iOS versions
        // so Web Audio is not muted by the hardware silent switch.
        if ("audioSession" in navigator) {
          try {
            navigator.audioSession.type = "playback";
          } catch {
            // Unsupported or read-only implementations are safe.
          }
        }

        // Creating AudioContext inside a user gesture is
        // important for mobile Safari.
        if (!audioContext) {
          audioContext = new AudioContextClass({
            latencyHint: "interactive"
          });
        }

        if (audioContext.state !== "running") {
          await audioContext.resume();
        }

        audioUnlocked = (
          audioContext.state === "running"
        );

        return audioUnlocked;

      } catch (error) {
        console.warn(
          "Web Audio could not be unlocked.",
          error
        );

        return false;
      }
    }


    async function decodeSound(name) {
      if (!audioContext) {
        return null;
      }

      if (soundBuffers.has(name)) {
        return soundBuffers.get(name);
      }

      if (decodePromises.has(name)) {
        return decodePromises.get(name);
      }

      const promise = (async () => {
        const rawData = await fetchSoundFile(
          name,
          SOUND_FILES[name]
        );

        if (!rawData || !audioContext) {
          return null;
        }

        try {
          // Use a copy because some browser implementations
          // detach the supplied ArrayBuffer while decoding.
          const decoded = await audioContext.decodeAudioData(
            rawData.slice(0)
          );

          soundBuffers.set(name, decoded);
          return decoded;

        } catch (error) {
          console.warn(
            `Sound "${name}" could not be decoded.`,
            error
          );

          return null;
        }
      })();

      decodePromises.set(name, promise);
      return promise;
    }


    async function prepareDecodedSounds() {
      const unlocked = await unlockAudio();

      if (!unlocked) {
        return;
      }

      for (const name of Object.keys(SOUND_FILES)) {
        decodeSound(name);
      }
    }


    async function playGameSound(name) {
      if (name === "powerJump") {
        const now = performance.now();

        if (now - lastPowerJumpSoundTime < 90) {
          return;
        }

        lastPowerJumpSoundTime = now;
      }

      const unlocked = await unlockAudio();

      if (!unlocked || !audioContext) {
        return;
      }

      const buffer = await decodeSound(name);

      if (!buffer || !audioContext) {
        return;
      }

      try {
        if (audioContext.state !== "running") {
          await audioContext.resume();
        }

        const source = audioContext.createBufferSource();
        const gain = audioContext.createGain();

        source.buffer = buffer;
        gain.gain.value = SOUND_VOLUMES[name] ?? 1.0;

        source.connect(gain);
        gain.connect(audioContext.destination);

        source.start(0);

        source.addEventListener(
          "ended",
          () => {
            source.disconnect();
            gain.disconnect();
          },
          { once: true }
        );

      } catch (error) {
        console.warn(
          `Sound "${name}" could not be played.`,
          error
        );
      }
    }


    preloadSoundFiles();


    // ========================================================
    // HELPERS
    // ========================================================

    function clamp(value, minimum, maximum) {
      return Math.max(minimum, Math.min(maximum, value));
    }

    function moveTowards(current, target, maxDelta) {
      if (current < target) {
        return Math.min(current + maxDelta, target);
      }

      if (current > target) {
        return Math.max(current - maxDelta, target);
      }

      return target;
    }

    function heightToWorldY(heightMeters) {
      return START_GROUND_Y - heightMeters * 10;
    }

    function positiveModulo(value, divisor) {
      return ((value % divisor) + divisor) % divisor;
    }

    function rectsOverlap(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function roundedRectPath(ctx, x, y, w, h, radius) {
      const r = Math.min(radius, w / 2, h / 2);

      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }


    // ========================================================
    // LEVEL GEOMETRY
    // ========================================================


    // ========================================================
    // PROCEDURAL PIXEL ART — NO EXTERNAL IMAGE FILES
    // ========================================================

    const PIXEL_ART = {
      outline: "#3a2a27",
      darkOutline: "#201c25",

      chickBody: "#f6c84b",
      chickLight: "#ffe786",
      chickShadow: "#c9822d",
      chickDeepShadow: "#915020",
      chickComb: "#da5547",
      chickBeak: "#ef8129",
      chickEye: "#17151b",
      chickEyeLight: "#fff9dd",
      chickLeg: "#d76b27",

      grassLight: "#b4cf71",
      grass: "#769b4b",
      grassDark: "#466036",
      soilLight: "#866846",
      soil: "#654b35",
      soilDark: "#3e302a",

      metalLight: "#a2a8b8",
      metal: "#656a79",
      metalDark: "#3b3d49",
      metalDeep: "#242630",
      bolt: "#d4d8e0",
      bounceLight: "#ffe57b",
      bounceDark: "#c98a2e",

      goalLight: "#fff078",
      goal: "#d7a939",
      goalDark: "#7d5622",

      uiPanel: "rgba(20, 22, 31, 0.86)",
      uiBorder: "#847253",
      uiInner: "#3b3540"
    };


    function pixelRect(
      ctx,
      x,
      y,
      width,
      height,
      color
    ) {
      ctx.fillStyle = color;
      ctx.fillRect(
        Math.round(x),
        Math.round(y),
        Math.round(width),
        Math.round(height)
      );
    }


    function deterministicHash(x, y = 0) {
      let value = (
        Math.imul(Math.floor(x), 374761393) +
        Math.imul(Math.floor(y), 668265263)
      ) | 0;

      value = Math.imul(
        value ^ (value >>> 13),
        1274126177
      );

      return (
        (value ^ (value >>> 16)) >>> 0
      ) / 4294967295;
    }


    function drawPixelPanel(
      ctx,
      x,
      y,
      width,
      height
    ) {
      pixelRect(
        ctx,
        x,
        y,
        width,
        height,
        PIXEL_ART.darkOutline
      );

      pixelRect(
        ctx,
        x + 3,
        y + 3,
        width - 6,
        height - 6,
        PIXEL_ART.uiBorder
      );

      pixelRect(
        ctx,
        x + 6,
        y + 6,
        width - 12,
        height - 12,
        PIXEL_ART.uiPanel
      );

      pixelRect(
        ctx,
        x + 9,
        y + 9,
        width - 18,
        2,
        PIXEL_ART.uiInner
      );
    }


    function drawPixelPlatform(
      ctx,
      rect,
      isGoal
    ) {
      const x = Math.round(rect.x);
      const y = Math.round(rect.y);
      const width = Math.round(rect.w);
      const height = Math.round(rect.h);

      if (width <= 0 || height <= 0) {
        return;
      }

      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, width, height);
      ctx.clip();

      const outline = isGoal
        ? PIXEL_ART.goalDark
        : PIXEL_ART.outline;

      const topLight = isGoal
        ? PIXEL_ART.goalLight
        : PIXEL_ART.grassLight;

      const topMain = isGoal
        ? PIXEL_ART.goal
        : PIXEL_ART.grass;

      const topDark = isGoal
        ? PIXEL_ART.goalDark
        : PIXEL_ART.grassDark;

      const bodyLight = isGoal
        ? "#b47e29"
        : PIXEL_ART.soilLight;

      const body = isGoal
        ? "#8f6127"
        : PIXEL_ART.soil;

      const bodyDark = isGoal
        ? "#5f421f"
        : PIXEL_ART.soilDark;

      pixelRect(
        ctx,
        x,
        y,
        width,
        height,
        outline
      );

      pixelRect(
        ctx,
        x + 2,
        y + 2,
        Math.max(0, width - 4),
        4,
        topLight
      );

      pixelRect(
        ctx,
        x + 2,
        y + 6,
        Math.max(0, width - 4),
        5,
        topMain
      );

      for (
        let tileX = x + 4;
        tileX < x + width - 3;
        tileX += 12
      ) {
        const phase = (
          Math.floor(tileX / 12) % 3
        );

        const toothHeight = (
          phase === 0 ? 4 :
          phase === 1 ? 2 : 3
        );

        pixelRect(
          ctx,
          tileX,
          y + 10,
          5,
          toothHeight,
          topDark
        );
      }

      pixelRect(
        ctx,
        x + 2,
        y + 12,
        Math.max(0, width - 4),
        Math.max(0, height - 14),
        body
      );

      for (
        let tileX = x + 4;
        tileX < x + width - 2;
        tileX += 16
      ) {
        const tileIndex = Math.floor(
          (tileX - x) / 16
        );

        const localWidth = Math.min(
          14,
          x + width - 2 - tileX
        );

        if (localWidth <= 0) {
          continue;
        }

        if (tileIndex % 2 === 0) {
          pixelRect(
            ctx,
            tileX,
            y + 14,
            localWidth,
            4,
            bodyLight
          );
        }

        pixelRect(
          ctx,
          tileX + Math.max(0, localWidth - 3),
          y + 18,
          Math.min(3, localWidth),
          Math.max(0, height - 20),
          bodyDark
        );

        if (
          deterministicHash(
            tileX,
            Math.round(rect.y)
          ) > 0.45
        ) {
          pixelRect(
            ctx,
            tileX + 3,
            y + 17,
            Math.min(5, localWidth),
            2,
            bodyDark
          );
        }
      }

      pixelRect(
        ctx,
        x + 2,
        y + height - 4,
        Math.max(0, width - 4),
        2,
        bodyDark
      );

      if (isGoal) {
        const glintPhase = (
          Math.floor(performance.now() / 180)
        ) % 4;

        for (
          let glintX = x + 12 + glintPhase * 7;
          glintX < x + width - 8;
          glintX += 42
        ) {
          pixelRect(
            ctx,
            glintX,
            y + 3,
            4,
            2,
            "#fff9c4"
          );

          pixelRect(
            ctx,
            glintX + 1,
            y + 1,
            2,
            6,
            "#fff9c4"
          );
        }
      }

      ctx.restore();
    }


    function drawPixelBlock(
      ctx,
      rect
    ) {
      const x = Math.round(rect.x);
      const y = Math.round(rect.y);
      const width = Math.round(rect.w);
      const height = Math.round(rect.h);

      if (width <= 0 || height <= 0) {
        return;
      }

      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, width, height);
      ctx.clip();

      pixelRect(
        ctx,
        x,
        y,
        width,
        height,
        PIXEL_ART.darkOutline
      );

      pixelRect(
        ctx,
        x + 3,
        y + 3,
        Math.max(0, width - 6),
        Math.max(0, height - 6),
        PIXEL_ART.metalDark
      );

      const panelSize = 24;

      for (
        let panelY = y + 4;
        panelY < y + height - 3;
        panelY += panelSize
      ) {
        for (
          let panelX = x + 4;
          panelX < x + width - 3;
          panelX += panelSize
        ) {
          const panelWidth = Math.min(
            panelSize - 2,
            x + width - 4 - panelX
          );

          const panelHeight = Math.min(
            panelSize - 2,
            y + height - 4 - panelY
          );

          if (
            panelWidth <= 0 ||
            panelHeight <= 0
          ) {
            continue;
          }

          const variation = deterministicHash(
            panelX,
            panelY
          );

          pixelRect(
            ctx,
            panelX,
            panelY,
            panelWidth,
            panelHeight,
            variation > 0.5
              ? PIXEL_ART.metal
              : "#5b606f"
          );

          pixelRect(
            ctx,
            panelX,
            panelY,
            panelWidth,
            3,
            PIXEL_ART.metalLight
          );

          pixelRect(
            ctx,
            panelX + panelWidth - 3,
            panelY + 3,
            3,
            Math.max(0, panelHeight - 3),
            PIXEL_ART.metalDeep
          );

          if (
            panelWidth >= 10 &&
            panelHeight >= 10
          ) {
            pixelRect(
              ctx,
              panelX + 3,

    function drawPixelMountainLayer(
      ctx,
      cameraY,
      baseline,
      color,
      highlight,
      parallax,
      spacing,
      peakHeight
    ) {
      const offset = positiveModulo(
        -cameraY * parallax,
        spacing
      );

      for (
        let index = -2;
        index < 9;
        index += 1
      ) {
        const baseX = (
          index * spacing + offset
        );

        const variation = deterministicHash(
          index,
          Math.floor(baseline)
        );

        const width = (
          spacing * (0.75 + variation * 0.45)
        );

        const height = (
          peakHeight * (0.72 + variation * 0.5)
        );

        const steps = 8;

        for (
          let step = 0;
          step < steps;
          step += 1
        ) {
          const ratio = (
            1 - step / steps
          );

          const stepWidth = width * ratio;
          const stepHeight = height / steps;

          pixelRect(
            ctx,
            baseX + (width - stepWidth) / 2,
            baseline - (step + 1) * stepHeight,
            stepWidth,
            stepHeight + 1,
            color
          );
        }

        pixelRect(
          ctx,
          baseX + width * 0.44,
          baseline - height,
          width * 0.12,
          height * 0.34,
          highlight
        );
      }
    }

    class Platform {
      constructor(x, y, width, height = 24, isGoal = false) {
        this.rect = {
          x: Math.round(x),
          y: Math.round(y),
          w: Math.round(width),
          h: Math.round(height)
        };

        this.isGoal = isGoal;
      }

      draw(ctx, cameraY) {
        const drawRect = {
          x: this.rect.x,
          y: Math.round(this.rect.y - cameraY),
          w: this.rect.w,
          h: this.rect.h
        };

        if (
          drawRect.y + drawRect.h < -50 ||
          drawRect.y > SCREEN_HEIGHT + 50
        ) {
          return;
        }

        drawPixelPlatform(
          ctx,
          drawRect,
          this.isGoal
        );
      }
    }

    function createLevel() {
      const platforms = [
        new Platform(
          0,
          START_GROUND_Y,
          WORLD_WIDTH
        )
      ];

      for (const [centerX, heightMeters, width] of LEVEL_DATA) {
        const worldY = heightToWorldY(heightMeters);
        const x = centerX - width / 2;

        platforms.push(
          new Platform(
            x,
            worldY,
            width,
            24,
            heightMeters === MAX_HEIGHT_METERS
          )
        );
      }

      const blocks = [];

      for (
        const [x, lowerHeight, upperHeight, width]
        of BLOCK_DATA
      ) {
        const topY = heightToWorldY(upperHeight);
        const bottomY = heightToWorldY(lowerHeight);

        blocks.push(
          new SolidBlock(
            x,
            topY,
            width,
            bottomY - topY
          )
        );
      }

      return { platforms, blocks };
    }


    // ========================================================
    // PLAYER
    // ========================================================

    class Player {
      constructor(x, y) {
        this.startX = Number(x);
        this.startY = Number(y);

        this.x = Number(x);
        this.y = Number(y);

        this.vx = 0.0;
        this.vy = 0.0;

        this.onGround = false;

        this.charging = false;
        this.chargeTime = 0.0;

        this.facing = 1;

        this.currentPlatform = null;

        this.bounceFlashTimer = 0.0;
        this.lastBounceSide = 0;
      }

      get rect() {
        return {
          x: Math.round(this.x),
          y: Math.round(this.y),
          w: PLAYER_WIDTH,
          h: PLAYER_HEIGHT
        };
      }

      reset() {
        this.x = this.startX;
        this.y = this.startY;

        this.vx = 0.0;
        this.vy = 0.0;

        this.onGround = false;

        this.charging = false;
        this.chargeTime = 0.0;

        this.facing = 1;
        this.currentPlatform = null;

        this.bounceFlashTimer = 0.0;
        this.lastBounceSide = 0;
      }

      startCharge() {
        if (!this.onGround || this.charging) {
          return;
        }

        this.charging = true;
        this.chargeTime = 0.0;
        this.vx = 0.0;
      }

      releaseJump() {
        if (!this.charging) {
          return;
        }

        if (!this.onGround) {
          this.charging = false;
          this.chargeTime = 0.0;
          return;
        }

        const chargeRatio = clamp(
          this.chargeTime / MAX_CHARGE_TIME,
          0.0,
          1.0
        );

        const power = chargeRatio ** 0.75;

        const verticalSpeed = (
          MIN_JUMP_SPEED +
          (
            MAX_JUMP_SPEED -
            MIN_JUMP_SPEED
          ) * power
        );

        const horizontalSpeed = (
          MIN_HORIZONTAL_JUMP_SPEED +
          (
            MAX_HORIZONTAL_JUMP_SPEED -
            MIN_HORIZONTAL_JUMP_SPEED
          ) * power
        );

        this.vy = -verticalSpeed;
        this.vx = horizontalSpeed * this.facing;

        this.onGround = false;
        this.currentPlatform = null;

        this.charging = false;
        this.chargeTime = 0.0;

        playGameSound("jump");
      }

      applySideBounce(hitSide) {
        const speed = Math.max(
          Math.abs(this.vx) * WALL_BOUNCE_FACTOR,
          180.0
        );

        if (hitSide > 0) {
          this.vx = -speed;
          this.lastBounceSide = 1;
        } else {
          this.vx = speed;
          this.lastBounceSide = -1;
        }

        this.vy = Math.max(
          this.vy - WALL_BOUNCE_VERTICAL_KICK,
          -MAX_BOUNCE_UPWARD_SPEED
        );

        this.onGround = false;
        this.currentPlatform = null;

        this.bounceFlashTimer = 0.18;

        playGameSound("powerJump");
      }

      update(
        dt,
        platforms,
        blocks,
        leftPressed,
        rightPressed
      ) {
        if (this.bounceFlashTimer > 0.0) {
          this.bounceFlashTimer = Math.max(
            0.0,
            this.bounceFlashTimer - dt
          );
        }

        let movementDirection = 0;

        if (leftPressed && !rightPressed) {
          movementDirection = -1;
        } else if (rightPressed && !leftPressed) {
          movementDirection = 1;
        }

        if (movementDirection !== 0) {
          this.facing = movementDirection;
        }

        if (this.onGround) {
          if (this.charging) {
            this.vx = 0.0;
          } else if (movementDirection !== 0) {
            this.vx = moveTowards(
              this.vx,
              movementDirection * MAX_RUN_SPEED,
              GROUND_ACCELERATION * dt
            );
          } else {
            this.vx = moveTowards(
              this.vx,
              0.0,
              GROUND_FRICTION * dt
            );
          }
        }

        if (this.charging && this.onGround) {
          this.chargeTime = Math.min(
            this.chargeTime + dt,
            MAX_CHARGE_TIME
          );
        }

        this.vy += GRAVITY * dt;


        // ----------------------------------------------------
        // Horizontal movement and side collisions
        // ----------------------------------------------------

        let oldRect = this.rect;

        this.x += this.vx * dt;

        if (this.x < 0) {
          this.x = 0;

          if (this.vx < 0) {
            this.applySideBounce(-1);
          }
        } else if (
          this.x + PLAYER_WIDTH > WORLD_WIDTH
        ) {
          this.x = WORLD_WIDTH - PLAYER_WIDTH;

          if (this.vx > 0) {
            this.applySideBounce(1);
          }
        }

        let currentRect = this.rect;

        for (const platform of platforms) {
          const p = platform.rect;

          const verticalOverlap = (
            currentRect.y + currentRect.h > p.y &&
            currentRect.y < p.y + p.h
          );

          if (!verticalOverlap) {
            continue;
          }

          const crossedLeftSide = (
            this.vx > 0 &&
            oldRect.x + oldRect.w <= p.x &&
            currentRect.x + currentRect.w >= p.x
          );

          if (crossedLeftSide) {
            this.x = p.x - PLAYER_WIDTH;
            this.vx = 0.0;
            currentRect = this.rect;
            continue;
          }

          const crossedRightSide = (
            this.vx < 0 &&
            oldRect.x >= p.x + p.w &&
            currentRect.x <= p.x + p.w
          );

          if (crossedRightSide) {
            this.x = p.x + p.w;
            this.vx = 0.0;
            currentRect = this.rect;
          }
        }

        currentRect = this.rect;

        for (const block of blocks) {
          const b = block.rect;

          if (!rectsOverlap(currentRect, b)) {
            continue;
          }

          if (
            this.vx > 0 &&
            oldRect.x + oldRect.w <= b.x
          ) {
            this.x = b.x - PLAYER_WIDTH;
            this.applySideBounce(1);
            currentRect = this.rect;
          } else if (
            this.vx < 0 &&
            oldRect.x >= b.x + b.w
          ) {
            this.x = b.x + b.w;
            this.applySideBounce(-1);
            currentRect = this.rect;
          }
        }


        // ----------------------------------------------------
        // Vertical movement and top/bottom collisions
        // ----------------------------------------------------

        oldRect = this.rect;

        this.y += this.vy * dt;

        let newRect = this.rect;

        this.onGround = false;
        this.currentPlatform = null;

        for (const block of blocks) {
          const b = block.rect;

          const horizontalOverlap = (
            newRect.x + newRect.w > b.x &&
            newRect.x < b.x + b.w
          );

          if (!horizontalOverlap) {
            continue;
          }

          const crossedBlockTop = (
            this.vy >= 0 &&
            oldRect.y + oldRect.h <= b.y &&
            newRect.y + newRect.h >= b.y
          );

          if (crossedBlockTop) {
            this.y = b.y - PLAYER_HEIGHT;
            this.vy = 0.0;
            this.onGround = true;
            this.currentPlatform = block;

            newRect = this.rect;
            break;
          }

          const crossedBlockUnderside = (
            this.vy < 0 &&
            oldRect.y >= b.y + b.h &&
            newRect.y <= b.y + b.h
          );

          if (crossedBlockUnderside) {
            this.y = b.y + b.h;
            this.vy = Math.abs(this.vy)
              * CEILING_BOUNCE_FACTOR;

            this.onGround = false;
            this.currentPlatform = null;

            newRect = this.rect;
            break;
          }
        }

        if (!this.onGround) {
          for (const platform of platforms) {
            const p = platform.rect;

            const horizontalOverlap = (
              newRect.x + newRect.w > p.x &&
              newRect.x < p.x + p.w
            );

            if (!horizontalOverlap) {
              continue;
            }

            const crossedTop = (
              this.vy >= 0 &&
              oldRect.y < p.y &&
              newRect.y + newRect.h >= p.y
            );

            if (crossedTop) {
              this.y = p.y - PLAYER_HEIGHT;
              this.vy = 0.0;

              this.onGround = true;
              this.currentPlatform = platform;

              newRect = this.rect;
              break;
            }

            const crossedUnderside = (
              this.vy < 0 &&
              oldRect.y >= p.y + p.h &&
              newRect.y <= p.y + p.h
            );

            if (crossedUnderside) {
              this.y = p.y + p.h;
              this.vy = 0.0;

              this.onGround = false;
              this.currentPlatform = null;

              newRect = this.rect;
              break;
            }
          }
        }
      }

      draw(ctx, cameraY) {
        const drawX = Math.round(this.x);
        const drawY = Math.round(this.y - cameraY);

        let state = "idle";

        if (this.charging) {
          state = "charge";
        } else if (!this.onGround && this.vy < 0) {
          state = "jump";
        } else if (!this.onGround && this.vy >= 0) {
          state = "fall";
        } else if (Math.abs(this.vx) > 30) {
          state = "run";
        }

        const animationFrame = Math.floor(
          performance.now() / 105
        );

        drawPixelChicken(
          ctx,
          drawX,
          drawY,
          this.facing,
          state,
          animationFrame,
          this.bounceFlashTimer
        );
      }
    }

    function drawBackground(ctx, cameraY) {
      const centerWorldY = (
        cameraY + SCREEN_HEIGHT * 0.5
      );

      const centerHeight = clamp(
        (
          START_GROUND_Y -
          centerWorldY
        ) / 10,
        0,
        MAX_HEIGHT_METERS
      );

      const palette = getBackgroundPalette(
        centerHeight
      );

      const bandHeight = 20;
      const topRgb = palette.skyTop.match(
        /\w\w/g
      ).map(value => parseInt(value, 16));

      const bottomRgb = palette.skyBottom.match(
        /\w\w/g
      ).map(value => parseInt(value, 16));

      for (
        let y = 0;
        y < SCREEN_HEIGHT;
        y += bandHeight
      ) {
        const ratio = y / SCREEN_HEIGHT;

        const mixed = topRgb.map(
          (value, index) => Math.round(
            value +
            (
              bottomRgb[index] -
              value
            ) * ratio
          )
        );

        pixelRect(
          ctx,
          0,
          y,
          SCREEN_WIDTH,
          bandHeight + 1,
          `rgb(${mixed[0]}, ${mixed[1]}, ${mixed[2]})`
        );
      }

      if (palette.stars) {
        const starCount = (
          centerHeight >= 1500 ? 105 : 62
        );

        for (
          let index = 0;
          index < starCount;
          index += 1
        ) {
          const x = Math.floor(
            deterministicHash(index, 11) *
            SCREEN_WIDTH
          );

          const baseY = Math.floor(
            deterministicHash(index, 29) *
            SCREEN_HEIGHT
          );

          const y = positiveModulo(
            baseY -
            cameraY * (
              0.025 +
              deterministicHash(index, 51) * 0.025
            ),
            SCREEN_HEIGHT
          );

          const bright = (
            deterministicHash(index, 73) > 0.78
          );

          const twinkle = (
            Math.floor(
              performance.now() / 280 +
              index
            ) % 5
          ) === 0;

          const size = (
            bright && twinkle ? 3 :
            bright ? 2 : 1
          );

          pixelRect(
            ctx,
            x,
            y,
            size,
            size,
            bright
              ? "#e9e4c9"
              : "#77839c"
          );
        }
      }

      const cloudAmount = (
        centerHeight >= 1500 ? 4 : 8
      );

      for (
        let index = 0;
        index < cloudAmount;
        index += 1
      ) {
        const cloudX = positiveModulo(
          index * 173 +
          performance.now() * (
            0.004 +
            index * 0.0004
          ),
          SCREEN_WIDTH + 220
        ) - 110;

        const cloudY = positiveModulo(
          index * 127 -
          cameraY * 0.07,
          SCREEN_HEIGHT + 180
        ) - 90;

        const scale = (
          index % 3 === 0
            ? 2
            : 1
        );

        drawPixelCloud(
          ctx,
          Math.round(cloudX),
          Math.round(cloudY),
          scale,
          palette.cloud,
          palette.cloudShadow
        );
      }

      drawPixelMountainLayer(
        ctx,
        cameraY,
        SCREEN_HEIGHT - 86,
        palette.far,
        palette.farHighlight,
        0.04,
        170,
        185
      );

      drawPixelMountainLayer(
        ctx,
        cameraY,
        SCREEN_HEIGHT - 26,
        palette.near,
        palette.nearHighlight,
        0.09,
        145,
        230
      );

      pixelRect(
        ctx,
        0,
        0,
        8,
        SCREEN_HEIGHT,
        "rgba(8, 9, 16, 0.30)"
      );

      pixelRect(
        ctx,
        SCREEN_WIDTH - 8,
        0,
        8,
        SCREEN_HEIGHT,
        "rgba(8, 9, 16, 0.30)"
      );
    }

        barWidth /

      );

        ctx,
        barX - 3,
        barY - 3,
        barWidth + 6,

        barWidth,

        progress * segmentCount

      for (
        let index = 0;

          ctx,
          barX +
          index * (
            segmentWidth +
            segmentGap

      );

      spawnY = (
        START_GROUND_Y -
        PLAYER_HEIGHT
      );

      spawnPlatform = platforms[0];

    } else {
      const targetY = heightToWorldY(
        DEBUG_START_HEIGHT
      );

      const candidates = platforms.filter(
        platform => Math.abs(
          platform.rect.y - targetY
        ) <= 2
      );

      if (candidates.length === 0) {
        throw new Error(
          `No platform found at ${DEBUG_START_HEIGHT} m`
        );
      }

      spawnPlatform = candidates.reduce(
        (best, platform) => {
          const bestDistance = Math.abs(
            best.rect.x + best.rect.w / 2 -
            DEBUG_START_X
          );

          const currentDistance = Math.abs(
            platform.rect.x + platform.rect.w / 2 -
            DEBUG_START_X
          );

          return currentDistance < bestDistance
            ? platform
            : best;
        }
      );

      spawnX = (
        spawnPlatform.rect.x +
        spawnPlatform.rect.w / 2 -
        PLAYER_WIDTH / 2
      );

      spawnY = (
        spawnPlatform.rect.y -
        PLAYER_HEIGHT
      );
    }

    const player = new Player(spawnX, spawnY);

    // Start in a stable grounded state instead of waiting for
    // the first physics frame to rediscover the platform.
    player.onGround = true;
    player.currentPlatform = spawnPlatform;

    let cameraY = Math.min(
      spawnY - SCREEN_HEIGHT * 0.62,
      0.0
    );

    let highestHeight = Math.max(
      0.0,
      (
        START_GROUND_Y -
        (
          spawnY +
          PLAYER_HEIGHT
        )
      ) / 10.0
    );

    let currentHeight = highestHeight;

    let won = false;
    let paused = false;
    let levelTwoCheckpointActive = (
      DEBUG_START_HEIGHT !== null && DEBUG_START_HEIGHT >= 1000
    );
    let levelBannerTimer = 0.0;

    const keys = new Set();

    let mobileLeftPressed = false;
    let mobileRightPressed = false;


    function resetPlayer() {
      player.reset();

      player.onGround = true;
      player.currentPlatform = spawnPlatform;

      cameraY = Math.min(
        player.y - SCREEN_HEIGHT * 0.62,
        0.0
      );

      won = false;
    }


    function isLeftPressed() {
      return (
        keys.has("ArrowLeft") ||
        keys.has("KeyA") ||
        mobileLeftPressed
      );
    }

    function isRightPressed() {
      return (
        keys.has("ArrowRight") ||
        keys.has("KeyD") ||
        mobileRightPressed
      );
    }



    function bindHoldButton(button, onPress, onRelease) {
      const activePointers = new Set();

      function press(event) {
        event.preventDefault();
        prepareDecodedSounds();

        activePointers.add(event.pointerId);
        button.classList.add("is-pressed");

        try {
          button.setPointerCapture(event.pointerId);
        } catch {
          // Pointer capture is optional.
        }

        onPress();
      }

      function release(event) {
        if (!activePointers.has(event.pointerId)) {
          return;
        }

        event.preventDefault();
        activePointers.delete(event.pointerId);

        if (activePointers.size === 0) {
          button.classList.remove("is-pressed");
          onRelease();
        }
      }

      button.addEventListener("pointerdown", press);
      button.addEventListener("pointerup", release);
      button.addEventListener("pointercancel", release);
      button.addEventListener("lostpointercapture", release);

      button.addEventListener("contextmenu", event => {
        event.preventDefault();
      });
    }


    const mobileLeftButton = document.getElementById(
      "mobile-left"
    );

    const mobileRightButton = document.getElementById(
      "mobile-right"
    );

    const mobileJumpButton = document.getElementById(
      "mobile-jump"
    );

    const mobileRestartButton = document.getElementById(
      "mobile-restart"
    );

    const mobilePauseButton = document.getElementById(
      "mobile-pause"
    );


    bindHoldButton(
      mobileLeftButton,
      () => {
        mobileLeftPressed = true;
        canvas.focus();
      },
      () => {
        mobileLeftPressed = false;
      }
    );


    bindHoldButton(
      mobileRightButton,
      () => {
        mobileRightPressed = true;
        canvas.focus();
      },
      () => {
        mobileRightPressed = false;
      }
    );


    bindHoldButton(
      mobileJumpButton,
      () => {
        canvas.focus();

        if (!won && !paused) {
          player.startCharge();
        }
      },
      () => {
        if (!won && !paused) {
          player.releaseJump();
        }
      }
    );


    mobileRestartButton.addEventListener(
      "pointerdown",
      event => {
        event.preventDefault();
        prepareDecodedSounds();
        mobileRestartButton.classList.add("is-pressed");
        resetPlayer();
        canvas.focus();
      }
    );

    function releaseRestartButton(event) {
      event.preventDefault();
      mobileRestartButton.classList.remove("is-pressed");
    }

    mobileRestartButton.addEventListener(
      "pointerup",
      releaseRestartButton
    );

    mobileRestartButton.addEventListener(
      "pointercancel",
      releaseRestartButton
    );


    mobilePauseButton.addEventListener(
      "pointerdown",
      event => {
        event.preventDefault();
        prepareDecodedSounds();
        mobilePauseButton.classList.add("is-pressed");
        paused = !paused;
        mobilePauseButton.textContent = paused
          ? "RESUME"
          : "PAUSE";
        canvas.focus();
      }
    );

    function releasePauseButton(event) {
      event.preventDefault();
      mobilePauseButton.classList.remove("is-pressed");
    }

    mobilePauseButton.addEventListener(
      "pointerup",
      releasePauseButton
    );

    mobilePauseButton.addEventListener(
      "pointercancel",
      releasePauseButton
    );


    document.addEventListener(
      "touchmove",
      event => {
        if (event.target.closest(".mobile-controls")) {
          event.preventDefault();
        }
      },
      { passive: false }
    );


    window.addEventListener("keydown", event => {
      prepareDecodedSounds();

      if (
        event.code === "ArrowLeft" ||
        event.code === "ArrowRight" ||
        event.code === "Space"
      ) {
        event.preventDefault();
      }

      keys.add(event.code);

      if (event.repeat) {
        return;
      }

      if (event.code === "Escape") {
        paused = !paused;
        mobilePauseButton.textContent = paused
          ? "RESUME"
          : "PAUSE";
        return;
      }

      if (event.code === "KeyR") {
        resetPlayer();
        return;
      }

      if (event.code === "Space" && !won && !paused) {
        player.startCharge();
      }
    });


    window.addEventListener("keyup", event => {
      if (
        event.code === "ArrowLeft" ||
        event.code === "ArrowRight" ||
        event.code === "Space"
      ) {
        event.preventDefault();
      }

      keys.delete(event.code);

      if (event.code === "Space" && !won && !paused) {
        player.releaseJump();
      }
    });


    window.addEventListener("blur", () => {
      keys.clear();

      mobileLeftPressed = false;
      mobileRightPressed = false;

      mobileLeftButton.classList.remove("is-pressed");
      mobileRightButton.classList.remove("is-pressed");
      mobileJumpButton.classList.remove("is-pressed");

      if (player.charging) {
        player.charging = false;
        player.chargeTime = 0.0;
      }

      paused = true;
    });


    canvas.addEventListener("pointerdown", () => {
      canvas.focus();
    });

    canvas.focus();


    // ========================================================
    // GAME LOOP
    // ========================================================

    let previousTime = performance.now();

    function frame(now) {
      let dt = (now - previousTime) / 1000.0;
      previousTime = now;

      dt = Math.min(dt, 1.0 / 30.0);

      if (!paused && !won) {
        const physicsStep = 1.0 / 120.0;
        let remainingTime = dt;

        while (remainingTime > 0.0) {
          const step = Math.min(
            physicsStep,
            remainingTime
          );

          player.update(
            step,
            platforms,
            blocks,
            isLeftPressed(),
            isRightPressed()
          );

          remainingTime -= step;
        }
      }

      const playerFeetY = (
        player.y +
        PLAYER_HEIGHT
      );

      currentHeight = Math.max(
        0.0,
        (
          START_GROUND_Y -
          playerFeetY
        ) / 10.0
      );

      currentHeight = Math.min(
        currentHeight,
        MAX_HEIGHT_METERS
      );

      highestHeight = Math.max(
        highestHeight,
        currentHeight
      );

      if (
        !levelTwoCheckpointActive &&
        player.onGround &&
        player.currentPlatform === levelTwoCheckpoint
      ) {
        levelTwoCheckpointActive = true;
        spawnPlatform = levelTwoCheckpoint;
        player.startX = (
          levelTwoCheckpoint.rect.x + levelTwoCheckpoint.rect.w / 2 - PLAYER_WIDTH / 2
        );
        player.startY = levelTwoCheckpoint.rect.y - PLAYER_HEIGHT;
        levelBannerTimer = 2.2;
      }

      if (
        !won &&
        player.onGround &&
        player.currentPlatform === goalPlatform
      ) {
        won = true;
        playGameSound("finish");
      }

      if (levelBannerTimer > 0.0 && !paused) {
        levelBannerTimer = Math.max(0.0, levelBannerTimer - dt);
      }

      if (!paused) {
        const targetCameraY = Math.min(
          player.y - SCREEN_HEIGHT * 0.62,
          0.0
        );

        cameraY += (
          targetCameraY -
          cameraY
        ) * Math.min(
          CAMERA_SMOOTHING * dt,
          1.0
        );
      }

      if (player.y > 1000) {
        resetPlayer();
      }

      drawBackground(ctx, cameraY);

      for (const platform of platforms) {
        platform.draw(ctx, cameraY);
      }

      for (const block of blocks) {
        block.draw(ctx, cameraY);
      }

      player.draw(ctx, cameraY);

      drawUI(
        ctx,
        player,
        currentHeight,
        highestHeight
      );

      if (levelBannerTimer > 0.0 && !won) {
        const alpha = clamp(levelBannerTimer / 0.35, 0.0, 1.0);
        ctx.fillStyle = `rgba(0, 0, 0, ${0.55 * alpha})`;
        ctx.fillRect(SCREEN_WIDTH / 2 - 235, 122, 470, 104);
        drawText(ctx, "LEVEL 2", SCREEN_WIDTH / 2, 138, 38, COLORS.yellow, true, "center");
        drawText(ctx, "THE UPPER TOWER", SCREEN_WIDTH / 2, 184, 18, COLORS.white, true, "center");
      }

      if (won) {
        drawCenteredOverlay(
          ctx,
          "2000 METERS!",
          "You conquered both levels",
          "Press R to restart",
          COLORS.green
        );
      } else if (paused) {
        drawCenteredOverlay(
          ctx,
          "PAUSED",
          "Press Esc to continue",
          "R restarts from the last checkpoint",
          COLORS.yellow
        );
      }

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
